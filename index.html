<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <title>Marko Gym</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(to bottom, #f3f4f6, #ffffff);
      color: #111827;
      padding: 16px;
    }

    .container {
      max-width: 520px;
      margin: 0 auto;
    }

    .card {
      background: #ffffff;
      border-radius: 22px;
      padding: 18px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      margin-bottom: 16px;
    }

    .title {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .subtitle {
      color: #6b7280;
      font-size: 14px;
      margin-bottom: 18px;
    }

    .grid-2, .grid-3 {
      display: grid;
      gap: 12px;
    }

    .grid-2 { grid-template-columns: 1fr 1fr; }
    .grid-3 { grid-template-columns: 1fr 1fr 1fr; }

    label {
      display: block;
      font-size: 13px;
      color: #4b5563;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      height: 42px;
      border: 1px solid #d1d5db;
      border-radius: 14px;
      padding: 0 12px;
      font-size: 15px;
      background: #fff;
    }

    textarea {
      width: 100%;
      min-height: 80px;
      border: 1px solid #d1d5db;
      border-radius: 14px;
      padding: 10px 12px;
      font-size: 15px;
      background: #fff;
      resize: vertical;
      font-family: Arial, sans-serif;
      color: #111827;
    }

    textarea::placeholder {
      color: #9ca3af;
      font-size: 14px;
    }

    .exercise {
      border: 1px solid #e5e7eb;
      border-radius: 18px;
      padding: 14px;
      margin-bottom: 12px;
      background: #fafafa;
    }

    .exercise-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
      margin-bottom: 4px;
      padding: 4px 8px 4px 0;
      border-radius: 8px;
      transition: background 0.15s;
    }

    .exercise-header:hover,
    .exercise-header:active {
      background: #eef2f7;
    }

    .exercise-header h3 {
      font-size: 17px;
      margin: 0;
    }

    .history-icon {
      font-size: 14px;
      color: #6b7280;
      font-weight: normal;
    }

    .exercise p {
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 8px;
    }

    .ghost-line {
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 10px;
      background: #eef2f7;
      border-radius: 10px;
      padding: 8px 10px;
    }

    .volume-line {
      margin-top: 10px;
      background: #eef2f7;
      border-radius: 12px;
      padding: 10px 12px;
      display: flex;
      justify-content: space-between;
      font-size: 14px;
    }

    .meta-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-top: 8px;
      font-size: 12px;
      color: #6b7280;
      flex-wrap: wrap;
    }

    .e1rm-line { text-align: right; }

    .suggestion {
      font-weight: bold;
      border-radius: 10px;
      padding: 4px 8px;
      background: #f3f4f6;
    }

    .suggestion.up { color: #065f46; background: #d1fae5; }
    .suggestion.same { color: #374151; background: #e5e7eb; }
    .suggestion.down { color: #991b1b; background: #fee2e2; }

    .stat-box {
      background: #f3f4f6;
      border-radius: 16px;
      padding: 12px;
      text-align: center;
    }

    .stat-box .small {
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 4px;
    }

    .stat-box .big {
      font-size: 16px;
      font-weight: bold;
    }

    .footer-note {
      font-size: 12px;
      color: #6b7280;
      text-align: center;
      margin-top: 8px;
    }

    .last-notes {
      font-size: 12px;
      color: #6b7280;
      background: #fef9c3;
      border-radius: 10px;
      padding: 10px 12px;
      margin-top: 12px;
      border: 1px solid #fde68a;
    }

    .last-notes strong {
      color: #713f12;
      display: block;
      margin-bottom: 4px;
    }

    .notes-block { margin-top: 18px; }

    .button-row {
      margin-top: 18px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 14px;
      height: 44px;
      padding: 0 16px;
      font-size: 15px;
      cursor: pointer;
    }

    .primary-btn {
      background: #111827;
      color: white;
      flex: 1;
    }

    .secondary-btn {
      background: #e5e7eb;
      color: #111827;
    }

    .status {
      margin-top: 12px;
      font-size: 14px;
      text-align: center;
      color: #374151;
      min-height: 20px;
    }

    /* ===== MODAL ===== */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 16px;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal {
      background: #ffffff;
      border-radius: 22px;
      padding: 20px;
      max-width: 520px;
      width: 100%;
      max-height: 85vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 16px;
    }

    .modal-title {
      font-size: 20px;
      font-weight: bold;
      color: #111827;
      margin-bottom: 4px;
    }

    .modal-subtitle {
      font-size: 13px;
      color: #6b7280;
    }

    .modal-close {
      background: #f3f4f6;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      border: none;
      font-size: 20px;
      color: #374151;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      flex-shrink: 0;
      margin-left: 12px;
    }

    .history-entry {
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 12px;
      margin-bottom: 10px;
      background: #fafafa;
    }

    .history-entry.latest {
      border-color: #a7f3d0;
      background: #ecfdf5;
    }

    .history-date {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .history-latest-badge {
      font-size: 11px;
      background: #10b981;
      color: white;
      padding: 2px 8px;
      border-radius: 8px;
      font-weight: bold;
    }

    .history-main {
      font-size: 16px;
      font-weight: bold;
      color: #111827;
      margin-bottom: 4px;
    }

    .history-details {
      font-size: 12px;
      color: #6b7280;
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }

    .history-notes {
      font-size: 12px;
      color: #713f12;
      background: #fef9c3;
      border: 1px solid #fde68a;
      border-radius: 8px;
      padding: 6px 8px;
      margin-top: 6px;
    }

    .modal-empty {
      text-align: center;
      padding: 30px 20px;
      color: #6b7280;
      font-size: 14px;
    }

    .modal-loading {
      text-align: center;
      padding: 30px 20px;
      color: #6b7280;
      font-size: 14px;
    }

    @media (max-width: 480px) {
      .grid-2, .grid-3 { grid-template-columns: 1fr; }
      .button-row { flex-direction: column; }
      .primary-btn, .secondary-btn { width: 100%; }
      .meta-row { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="title">Marko Gym</div>
      <div class="subtitle">Trening log za telefon</div>

      <div class="grid-2">
        <div>
          <label for="date">Datum</label>
          <input type="date" id="date" />
        </div>
        <div>
          <label for="bodyWeight">Telesna težina (kg)</label>
          <input type="text" id="bodyWeight" inputmode="decimal" />
        </div>
      </div>

      <div id="lastNotesBlock"></div>
    </div>

    <div class="card">
      <h2 style="margin-bottom: 14px;">Vežbe</h2>
      <div id="exerciseList"></div>
    </div>

    <div class="card">
      <div class="grid-2">
        <div>
          <label for="duration">Trajanje treninga (min)</label>
          <input type="text" id="duration" inputmode="numeric" />
        </div>
      </div>

      <div class="notes-block">
        <label for="notes">Beleška (kako si se osećao, spavanje, stres, bol, hrana…)</label>
        <textarea id="notes" placeholder="npr. Loše spavao 5h, osećao umor u ramenima. Ručak 1h pre treninga."></textarea>
      </div>

      <div class="grid-3" style="margin-top: 16px;">
        <div class="stat-box">
          <div class="small">Ukupan volumen</div>
          <div class="big" id="totalVolume">0 kg</div>
        </div>
        <div class="stat-box">
          <div class="small">Gustina</div>
          <div class="big" id="density">0 kg/min</div>
        </div>
        <div class="stat-box">
          <div class="small">Broj vežbi</div>
          <div class="big" id="exerciseCount">0</div>
        </div>
      </div>

      <div class="button-row">
        <button class="primary-btn" id="saveWorkoutBtn">Sačuvaj trening</button>
        <button class="secondary-btn" id="resetBtn">Reset</button>
      </div>

      <div class="status" id="statusMessage"></div>

      <div class="footer-note">
        Klikni na naslov vežbe da vidiš istoriju.
      </div>
    </div>
  </div>

  <!-- MODAL -->
  <div class="modal-overlay" id="historyModal">
    <div class="modal">
      <div class="modal-header">
        <div>
          <div class="modal-title" id="modalTitle">Istorija</div>
          <div class="modal-subtitle" id="modalSubtitle">Zadnjih 5 treninga</div>
        </div>
        <button class="modal-close" id="modalClose">×</button>
      </div>
      <div id="modalContent"></div>
    </div>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwcWdCBEuoRNunnLqYo7YwxHW5e9bzg2mf-jUrsbBenzYCSc37bujV6PGBjg3njtralIw/exec";
    const STORAGE_KEY = "marko_gym_session_draft_v7";

    const defaultExercises = [
      { name: "Alternating dumbbell curl", muscle: "Biceps", sets: "3", reps: "9", weight: "20" },
      { name: "Alternating front dumbbell curl", muscle: "Biceps + rame", sets: "3", reps: "9", weight: "20" },
      { name: "Reverse fly", muscle: "Rame / gornja leđa", sets: "3", reps: "8", weight: "16" },
      { name: "Row", muscle: "Leđa", sets: "3", reps: "10", weight: "35" },
      { name: "Leg press", muscle: "Noge / gluteus", sets: "3", reps: "8", weight: "40" },
      { name: "Bench press", muscle: "Grudi / triceps", sets: "3", reps: "8", weight: "40" },
      { name: "Machine Chest Press", muscle: "Grudi / triceps", sets: "3", reps: "10", weight: "35" },
      { name: "Deadlift", muscle: "Leđa / zadnja loža / gluteus", sets: "3", reps: "8", weight: "40" }
    ];

    let exercises = deepCopy(defaultExercises);
    let backendLastSession = null;

    const exerciseList = document.getElementById("exerciseList");
    const totalVolumeEl = document.getElementById("totalVolume");
    const densityEl = document.getElementById("density");
    const exerciseCountEl = document.getElementById("exerciseCount");
    const durationInput = document.getElementById("duration");
    const dateInput = document.getElementById("date");
    const bodyWeightInput = document.getElementById("bodyWeight");
    const notesInput = document.getElementById("notes");
    const lastNotesBlock = document.getElementById("lastNotesBlock");
    const saveWorkoutBtn = document.getElementById("saveWorkoutBtn");
    const resetBtn = document.getElementById("resetBtn");
    const statusMessage = document.getElementById("statusMessage");

    const historyModal = document.getElementById("historyModal");
    const modalTitle = document.getElementById("modalTitle");
    const modalSubtitle = document.getElementById("modalSubtitle");
    const modalContent = document.getElementById("modalContent");
    const modalClose = document.getElementById("modalClose");

    function deepCopy(obj) { return JSON.parse(JSON.stringify(obj)); }

    function getTodayString() {
      const today = new Date();
      const yyyy = today.getFullYear();
      const mm = String(today.getMonth() + 1).padStart(2, "0");
      const dd = String(today.getDate()).padStart(2, "0");
      return `${yyyy}-${mm}-${dd}`;
    }

    function toNumber(value) {
      if (typeof value === "number") return value;
      if (typeof value !== "string") return 0;
      const normalized = value.replace(",", ".").trim();
      if (normalized === "") return 0;
      const parsed = Number(normalized);
      return Number.isFinite(parsed) ? parsed : 0;
    }

    function sanitizeNumericText(value, allowDecimal = false) {
      const str = String(value ?? "");
      let cleaned = str.replace(",", ".");

      if (allowDecimal) {
        cleaned = cleaned.replace(/[^0-9.]/g, "");
        const firstDot = cleaned.indexOf(".");
        if (firstDot !== -1) {
          cleaned = cleaned.slice(0, firstDot + 1) + cleaned.slice(firstDot + 1).replace(/\./g, "");
        }
      } else {
        cleaned = cleaned.replace(/\D/g, "");
      }
      return cleaned;
    }

    function escapeHtml(str) {
      return String(str || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function calculateVolume(exercise) {
      return toNumber(exercise.sets) * toNumber(exercise.reps) * toNumber(exercise.weight);
    }

    function calculateE1RM(weight, reps) {
      const w = toNumber(weight);
      const r = toNumber(reps);
      if (w <= 0 || r <= 0 || r >= 37) return 0;
      const denominator = 1.0278 - 0.0278 * r;
      if (denominator <= 0) return 0;
      return w / denominator;
    }

    function getPerformedExerciseCount() {
      return exercises.filter(ex =>
        toNumber(ex.sets) > 0 && toNumber(ex.reps) > 0 && toNumber(ex.weight) > 0
      ).length;
    }

    function calculateTotalVolume() {
      return exercises.reduce((sum, ex) => sum + calculateVolume(ex), 0);
    }

    function saveDraft() {
      const draft = {
        date: dateInput.value,
        bodyWeight: bodyWeightInput.value,
        duration: durationInput.value,
        notes: notesInput.value,
        exercises: deepCopy(exercises)
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(draft));
    }

    function loadDraft() {
      const raw = localStorage.getItem(STORAGE_KEY);

      if (!raw) {
        dateInput.value = getTodayString();
        bodyWeightInput.value = "116.7";
        durationInput.value = "25";
        notesInput.value = "";
        exercises = deepCopy(defaultExercises);
        return;
      }

      try {
        const draft = JSON.parse(raw);
        dateInput.value = draft.date || getTodayString();
        bodyWeightInput.value = draft.bodyWeight || "116.7";
        durationInput.value = draft.duration || "25";
        notesInput.value = draft.notes || "";
        exercises = Array.isArray(draft.exercises) && draft.exercises.length
          ? draft.exercises
          : deepCopy(defaultExercises);
      } catch (error) {
        console.error("Greška pri učitavanju draft-a:", error);
        dateInput.value = getTodayString();
        bodyWeightInput.value = "116.7";
        durationInput.value = "25";
        notesInput.value = "";
        exercises = deepCopy(defaultExercises);
      }
    }

    async function loadBackendLastSession() {
      try {
        const freshUrl = `${SCRIPT_URL}?t=${Date.now()}`;
        const response = await fetch(freshUrl, { method: "GET", cache: "no-store" });
        const result = await response.json();

        if (result.status === "success" && result.last_session) {
          backendLastSession = result.last_session;
        } else {
          backendLastSession = null;
        }
      } catch (error) {
        console.error("Greška pri učitavanju poslednjeg treninga:", error);
        backendLastSession = null;
      }
    }

    function renderLastNotes() {
      lastNotesBlock.innerHTML = "";
      if (!backendLastSession) return;
      if (!backendLastSession.notes || !backendLastSession.notes.trim()) return;

      const div = document.createElement("div");
      div.className = "last-notes";
      div.innerHTML = `
        <strong>Beleška sa prethodnog treninga (${escapeHtml(backendLastSession.date || "")}):</strong>
        ${escapeHtml(backendLastSession.notes)}
      `;
      lastNotesBlock.appendChild(div);
    }

    function buildLastSessionMap() {
      const map = new Map();
      if (!backendLastSession || !Array.isArray(backendLastSession.exercises)) return map;
      backendLastSession.exercises.forEach(ex => { map.set(ex.name, ex); });
      return map;
    }

    function getSuggestion(currentExercise, lastExercise) {
      if (!lastExercise) return { text: "→ ostavi", cls: "same" };
      const currentE1RM = calculateE1RM(currentExercise.weight, currentExercise.reps);
      const lastE1RM = calculateE1RM(lastExercise.weight, lastExercise.reps);
      if (currentE1RM <= 0 || lastE1RM <= 0) return { text: "→ ostavi", cls: "same" };
      const diff = currentE1RM - lastE1RM;
      if (diff >= 1.0) return { text: "↑ povećaj", cls: "up" };
      if (diff <= -1.0) return { text: "↓ smanji", cls: "down" };
      return { text: "→ ostavi", cls: "same" };
    }

    function renderExercises() {
      const lastSessionMap = buildLastSessionMap();
      exerciseList.innerHTML = "";

      exercises.forEach((exercise, index) => {
        const div = document.createElement("div");
        div.className = "exercise";

        const volume = calculateVolume(exercise);
        const e1rm = calculateE1RM(exercise.weight, exercise.reps);
        const lastExercise = lastSessionMap.get(exercise.name);
        const suggestion = getSuggestion(exercise, lastExercise);

        let ghostLine = "";
        if (
          lastExercise &&
          toNumber(lastExercise.sets) > 0 &&
          toNumber(lastExercise.reps) > 0 &&
          toNumber(lastExercise.weight) > 0
        ) {
          ghostLine = `
            <div class="ghost-line">
              Last session: ${lastExercise.sets} × ${lastExercise.reps} × ${lastExercise.weight} kg
            </div>
          `;
        }

        div.innerHTML = `
          <div class="exercise-header" data-exercise-name="${escapeHtml(exercise.name)}">
            <h3>${escapeHtml(exercise.name)}</h3>
            <span class="history-icon">📊 istorija</span>
          </div>
          <p>${escapeHtml(exercise.muscle)}</p>
          ${ghostLine}

          <div class="grid-3">
            <div>
              <label>Serije</label>
              <input type="text" inputmode="numeric" value="${exercise.sets}" data-index="${index}" data-field="sets" />
            </div>
            <div>
              <label>Ponavljanja</label>
              <input type="text" inputmode="numeric" value="${exercise.reps}" data-index="${index}" data-field="reps" />
            </div>
            <div>
              <label>Težina (kg)</label>
              <input type="text" inputmode="decimal" value="${exercise.weight}" data-index="${index}" data-field="weight" />
            </div>
          </div>

          <div class="volume-line">
            <span>Volumen</span>
            <strong id="volume-${index}">${volume.toFixed(0)} kg</strong>
          </div>

          <div class="meta-row">
            <div class="suggestion ${suggestion.cls}" id="suggestion-${index}">${suggestion.text}</div>
            <div class="e1rm-line" id="e1rm-${index}">e1RM: ${e1rm > 0 ? `${e1rm.toFixed(1)} kg` : "-"}</div>
          </div>
        `;

        exerciseList.appendChild(div);
      });
    }

    function updateExerciseUI(index) {
      const exercise = exercises[index];
      if (!exercise) return;

      const lastSessionMap = buildLastSessionMap();
      const lastExercise = lastSessionMap.get(exercise.name);
      const suggestion = getSuggestion(exercise, lastExercise);

      const volumeEl = document.getElementById(`volume-${index}`);
      const e1rmEl = document.getElementById(`e1rm-${index}`);
      const suggestionEl = document.getElementById(`suggestion-${index}`);

      const volume = calculateVolume(exercise);
      const e1rm = calculateE1RM(exercise.weight, exercise.reps);

      if (volumeEl) volumeEl.textContent = `${volume.toFixed(0)} kg`;
      if (e1rmEl) e1rmEl.textContent = `e1RM: ${e1rm > 0 ? `${e1rm.toFixed(1)} kg` : "-"}`;
      if (suggestionEl) {
        suggestionEl.textContent = suggestion.text;
        suggestionEl.className = `suggestion ${suggestion.cls}`;
      }
    }

    function updateTotals() {
      const totalVolume = calculateTotalVolume();
      const duration = toNumber(durationInput.value);
      const density = duration > 0 ? totalVolume / duration : 0;
      const exerciseCount = getPerformedExerciseCount();

      totalVolumeEl.textContent = `${totalVolume.toFixed(0)} kg`;
      densityEl.textContent = `${density.toFixed(0)} kg/min`;
      exerciseCountEl.textContent = exerciseCount;
    }

    function handleExerciseChange(e) {
      const index = Number(e.target.dataset.index);
      const field = e.target.dataset.field;
      if (Number.isNaN(index) || !field || !exercises[index]) return;

      const allowDecimal = field === "weight";
      const sanitized = sanitizeNumericText(e.target.value, allowDecimal);

      e.target.value = sanitized;
      exercises[index][field] = sanitized;

      updateExerciseUI(index);
      updateTotals();
      saveDraft();
    }

    // ===== MODAL =====
    function openHistoryModal(exerciseName) {
      modalTitle.textContent = exerciseName;
      modalSubtitle.textContent = "Učitavam istoriju...";
      modalContent.innerHTML = '<div class="modal-loading">⏳ Učitavam...</div>';
      historyModal.classList.add("active");
      fetchExerciseHistory(exerciseName);
    }

    function closeHistoryModal() {
      historyModal.classList.remove("active");
    }

    async function fetchExerciseHistory(exerciseName) {
      try {
        const url = `${SCRIPT_URL}?exercise=${encodeURIComponent(exerciseName)}&t=${Date.now()}`;
        const response = await fetch(url, { method: "GET", cache: "no-store" });
        const result = await response.json();

        if (result.status !== "success") {
          modalContent.innerHTML = `<div class="modal-empty">Greška: ${escapeHtml(result.message || "Nepoznata greška")}</div>`;
          return;
        }

        renderHistory(result.history || [], result.total_count || 0);
      } catch (error) {
        console.error("Greška:", error);
        modalContent.innerHTML = '<div class="modal-empty">Greška pri učitavanju istorije.</div>';
      }
    }

    function renderHistory(history, totalCount) {
      if (!history || history.length === 0) {
        modalSubtitle.textContent = "Nema istorije";
        modalContent.innerHTML = '<div class="modal-empty">Još nisi radio ovu vežbu.<br>Posle prvog treninga pojaviće se istorija ovde.</div>';
        return;
      }

      modalSubtitle.textContent = `Zadnjih ${history.length} ${history.length === 1 ? "trening" : "treninga"}${totalCount > history.length ? ` (od ukupno ${totalCount})` : ""}`;

      const html = history.map((entry, idx) => {
        const isLatest = idx === 0;
        const notesHtml = entry.notes && entry.notes.trim()
          ? `<div class="history-notes">📝 ${escapeHtml(entry.notes)}</div>`
          : "";

        return `
          <div class="history-entry ${isLatest ? "latest" : ""}">
            <div class="history-date">
              <span>${escapeHtml(entry.date)}</span>
              ${isLatest ? '<span class="history-latest-badge">POSLEDNJI</span>' : ""}
            </div>
            <div class="history-main">${entry.sets} × ${entry.reps} × ${entry.weight} kg</div>
            <div class="history-details">
              <span>Volumen: ${entry.volume.toFixed(0)} kg</span>
              <span>e1RM: ${entry.e1rm.toFixed(1)} kg</span>
            </div>
            ${notesHtml}
          </div>
        `;
      }).join("");

      modalContent.innerHTML = html;
    }

    function validateWorkout() {
      const bodyWeight = toNumber(bodyWeightInput.value);
      const duration = toNumber(durationInput.value);
      const performedCount = getPerformedExerciseCount();

      if (!dateInput.value) return "Unesi datum.";
      if (bodyWeight <= 0) return "Unesi ispravnu telesnu težinu.";
      if (duration <= 0) return "Unesi trajanje treninga veće od 0.";
      if (performedCount === 0) return "Unesi bar jednu vežbu sa serijama, ponavljanjima i težinom.";
      return null;
    }

    async function saveWorkout() {
      const validationError = validateWorkout();
      if (validationError) {
        statusMessage.textContent = validationError;
        return;
      }

      try {
        statusMessage.textContent = "Snimanje treninga...";

        const totalVolume = calculateTotalVolume();
        const duration = toNumber(durationInput.value);
        const density = duration > 0 ? totalVolume / duration : 0;

        const payload = {
          id: Date.now(),
          date: dateInput.value,
          body_weight: toNumber(bodyWeightInput.value),
          duration_min: duration,
          total_volume: Number(totalVolume.toFixed(0)),
          density: Number(density.toFixed(0)),
          notes: notesInput.value.trim(),
          exercises: deepCopy(exercises).map(ex => ({
            ...ex,
            sets: toNumber(ex.sets),
            reps: toNumber(ex.reps),
            weight: toNumber(ex.weight)
          }))
        };

        const response = await fetch(SCRIPT_URL, {
          method: "POST",
          body: JSON.stringify(payload),
          headers: { "Content-Type": "text/plain;charset=utf-8" }
        });

        const result = await response.json();

        if (result.status === "success") {
          statusMessage.textContent = "Trening je uspešno sačuvan u Google Sheet.";
          notesInput.value = "";
          await loadBackendLastSession();
          renderLastNotes();
          renderExercises();
          updateTotals();
          saveDraft();
        } else {
          statusMessage.textContent = "Greška pri snimanju: " + (result.message || "Nepoznata greška");
        }
      } catch (error) {
        statusMessage.textContent = "Greška pri slanju podataka.";
        console.error(error);
      }
    }

    function resetWorkout() {
      const confirmed = confirm("Da li si siguran da želiš reset treninga?");
      if (!confirmed) return;

      exercises = deepCopy(defaultExercises);
      dateInput.value = getTodayString();
      bodyWeightInput.value = "116.7";
      durationInput.value = "25";
      notesInput.value = "";
      statusMessage.textContent = "";
      saveDraft();
      renderExercises();
      updateTotals();
    }

    // ===== EVENT LISTENERS =====
    exerciseList.addEventListener("input", (e) => {
      if (e.target.matches("input[data-index]")) {
        handleExerciseChange(e);
      }
    });

    exerciseList.addEventListener("click", (e) => {
      const header = e.target.closest(".exercise-header");
      if (header) {
        const exerciseName = header.dataset.exerciseName;
        if (exerciseName) openHistoryModal(exerciseName);
      }
    });

    modalClose.addEventListener("click", closeHistoryModal);
    historyModal.addEventListener("click", (e) => {
      if (e.target === historyModal) closeHistoryModal();
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && historyModal.classList.contains("active")) {
        closeHistoryModal();
      }
    });

    bodyWeightInput.addEventListener("input", (e) => {
      e.target.value = sanitizeNumericText(e.target.value, true);
      saveDraft();
    });

    durationInput.addEventListener("input", (e) => {
      e.target.value = sanitizeNumericText(e.target.value, false);
      updateTotals();
      saveDraft();
    });

    dateInput.addEventListener("input", saveDraft);
    notesInput.addEventListener("input", saveDraft);
    saveWorkoutBtn.addEventListener("click", saveWorkout);
    resetBtn.addEventListener("click", resetWorkout);

    async function initApp() {
      loadDraft();
      await loadBackendLastSession();
      renderLastNotes();
      renderExercises();
      updateTotals();
    }

    initApp();
  </script>
</body>
</html>
